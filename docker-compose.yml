version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cancerguard-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword2026
      POSTGRES_DB: cancerguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: cancerguard-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword2026@db:5432/cancerguard
      - SECRET_KEY=supersecretkeyforcancerguardaiplatform2026
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=10080
    depends_on:
      - db
    volumes:
      - backend_uploads:/app/uploads
      - backend_reports:/app/reports

  frontend:
    build: ./frontend
    container_name: cancerguard-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
  backend_reports:
